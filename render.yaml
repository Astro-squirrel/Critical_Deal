databases:
  - name: critical-deal-db
    plan: free
    region: singapore
    databaseName: critical_deal
    user: critical_deal

services:
  - type: web
    name: critical-deal-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: critical-deal-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
      - key: BACKEND_HOST
        fromService:
          name: critical-deal-api
          type: web
          property: host
      - key: FRONTEND_HOST
        fromService:
          name: critical-deal-web
          type: web
          property: host
      - key: ITAD_API_KEY
        sync: false
      - key: ITAD_COUNTRY
        value: KR
      - key: ITAD_STEAM_SHOP_ID
        value: "61"
      - key: STEAM_API_KEY
        sync: false
      - key: GMS_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://gms.ssafy.io/gmsapi/api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-5.4-nano
      - key: CHAT_LLM_MODEL
        value: gpt-5.4-mini
      - key: LLM_TIMEOUT_SECONDS
        value: "90"
      - key: EMAIL_API_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

  - type: web
    name: critical-deal-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_HOST
        fromService:
          name: critical-deal-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
